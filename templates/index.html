<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Management Dashboard — Nokia Config</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    :root {
      --color-primary:   #1a6ebd;
      --color-system:    #198754;
      --color-iface:     #0d6efd;
      --color-static:    #fd7e14;
      --color-shutdown:  #dc3545;
      --color-active:    #198754;
      --color-header-bg: #1a1d23;
    }

    body { background: #f0f2f5; font-size: 0.88rem; }

    /* ── Header ── */
    .app-header {
      background: var(--color-header-bg);
      color: #fff;
      padding: 0.9rem 1.5rem;
      border-bottom: 3px solid var(--color-primary);
    }
    .app-header .title   { font-size: 1.25rem; font-weight: 700; letter-spacing: .5px; }
    .app-header .subtitle{ font-size: 0.78rem; color: #adb5bd; margin-top: 2px; }

    /* ── Directory bar ── */
    .dir-bar { background: #fff; border-bottom: 1px solid #dee2e6; padding: .6rem 1.5rem; }
    .dir-display {
      font-size: .84rem; font-family: monospace;
      background: #f8f9fa; border: 1px solid #dee2e6;
      border-radius: 5px; padding: .28rem .65rem;
      min-width: 180px; max-width: 500px; color: #343a40;
    }

    /* ── Stat cards ── */
    .stat-card {
      background: #fff; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 1rem 1.2rem; border-left: 4px solid var(--color-primary);
      transition: transform .15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .value { font-size: 1.7rem; font-weight: 700; line-height: 1; }
    .stat-card .label { font-size: 0.75rem; color: #6c757d; margin-top: 4px; }
    .stat-card.green  { border-color: var(--color-system); }
    .stat-card.blue   { border-color: var(--color-iface); }
    .stat-card.orange { border-color: var(--color-static); }
    .stat-card.gray   { border-color: #6c757d; }
    .stat-card.green  .value { color: var(--color-system); }
    .stat-card.blue   .value { color: var(--color-iface); }
    .stat-card.orange .value { color: var(--color-static); }

    /* ── Badges ── */
    .badge-system  { background: #d1e7dd; color: #0a3622; }
    .badge-iface   { background: #cfe2ff; color: #052c65; }
    .badge-static  { background: #ffe5d0; color: #6a2d00; }
    .badge-active  { background: #d1e7dd; color: #0a3622; }
    .badge-shutdown{ background: #f8d7da; color: #58151c; }

    /* ── Table ── */
    .ip-table { font-size: 0.82rem; }
    .ip-table thead th {
      background: #1a1d23; color: #e9ecef;
      position: sticky; top: 0; z-index: 10;
      white-space: nowrap; padding: .5rem .6rem; border: none;
    }
    .ip-table thead th.sortable { cursor: pointer; user-select: none; }
    .ip-table thead th.sortable:hover { background: #2d3038; }
    .ip-table thead th .sort-icon { opacity: .4; font-size: .7rem; margin-left: 3px; }
    .ip-table thead th.asc  .sort-icon::before { content: '▲'; opacity: 1; }
    .ip-table thead th.desc .sort-icon::before { content: '▼'; opacity: 1; }
    .ip-table tbody tr:nth-child(even) { background: #f8f9fa; }
    .ip-table tbody tr:hover { background: #e8f0fe; }
    .ip-table td { padding: .35rem .6rem; vertical-align: middle; border-color: #e9ecef; }
    .ip-table td.mono { font-family: 'Consolas', 'Menlo', monospace; }

    /* ── 설정 버튼 컬럼 (고정) ── */
    .th-settings {
      width: 30px; min-width: 30px;
      padding: .5rem .4rem !important;
      text-align: center; background: #12151a !important;
    }
    .btn-col-settings {
      background: none; border: none; color: #7a8390;
      cursor: pointer; padding: 0; font-size: 1rem; line-height: 1;
      transition: color .15s, transform .2s;
    }
    .btn-col-settings:hover { color: #fff; transform: rotate(45deg); }

    .table-wrap {
      max-height: calc(100vh - 320px); overflow-y: auto;
      border: 1px solid #dee2e6; border-radius: 8px;
    }

    /* ── Toolbar ── */
    .toolbar { background: #fff; border-radius: 8px; padding: .6rem 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .tab-pill .nav-link {
      border-radius: 20px; padding: .35rem 1rem; font-size: 0.82rem;
      color: #495057; margin-right: 4px;
    }
    .tab-pill .nav-link.active { background: var(--color-primary); color: #fff; }

    #loading { display: none; }

    .peer-cell { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .peer-cell:hover { white-space: normal; }

    .empty-state { padding: 3rem; text-align: center; color: #adb5bd; }
    .empty-state i { font-size: 3rem; }

    /* ════════════════════════════════════════
       컬럼 설정 모달
    ════════════════════════════════════════ */
    .col-modal-body { max-height: 70vh; overflow-y: auto; padding: .5rem .75rem; }

    /* 드래그 가능한 컬럼 아이템 */
    .col-item {
      display: flex; align-items: center; gap: .55rem;
      padding: .45rem .65rem; margin-bottom: 5px;
      background: #fff; border: 1px solid #dee2e6;
      border-radius: 7px; cursor: default;
      transition: box-shadow .12s, border-color .12s;
      user-select: none;
    }
    .col-item:hover { border-color: #adb5bd; box-shadow: 0 2px 6px rgba(0,0,0,.07); }
    /* SortableJS 드래그 상태 클래스 */
    .col-item.sortable-ghost  { opacity: .3; background: #e8f0fe; border: 1px dashed var(--color-primary); }
    .col-item.sortable-chosen { box-shadow: 0 4px 12px rgba(26,110,189,.25); border-color: var(--color-primary); }
    .col-item.sortable-drag   { opacity: .9; }

    .drag-handle {
      color: #ced4da; cursor: grab; font-size: 1rem; flex-shrink: 0;
      padding: 0 2px;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:hover  { color: #6c757d; }

    .col-item .col-label { flex: 1; font-size: .84rem; font-weight: 500; color: #343a40; }
    .col-item .col-key   { font-size: .72rem; color: #adb5bd; font-family: monospace; }

    /* 모달 액션 버튼 그룹 */
    .col-modal-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* 가시성 체크박스 색상 */
    .form-check-input:checked { background-color: var(--color-primary); border-color: var(--color-primary); }

    /* forceFallback 드래그 중 플로팅 엘리먼트 */
    .sortable-fallback {
      opacity: .85 !important;
      box-shadow: 0 6px 20px rgba(26,110,189,.35) !important;
      border: 1px solid var(--color-primary) !important;
      background: #fff !important;
      border-radius: 7px !important;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="app-header d-flex align-items-center gap-3">
  <i class="bi bi-router fs-4 text-primary"></i>
  <div>
    <div class="title">IP Management Dashboard</div>
    <div class="subtitle">Nokia SR OS Config — IP 관리대장 자동 생성</div>
  </div>
  <div class="ms-auto d-flex align-items-center gap-2">
    <span id="record-count" class="badge bg-secondary fs-6">0 records</span>
  </div>
</header>

<!-- ── Directory bar ── -->
<div class="dir-bar d-flex align-items-center gap-2">
  <i class="bi bi-folder2-open text-warning"></i>
  <label class="text-muted fw-semibold" style="white-space:nowrap">Config 폴더</label>
  <!-- 선택된 폴더 표시 영역 -->
  <div id="dir-display" class="dir-display flex-grow-1">
    <span class="text-muted fst-italic">폴더를 선택하세요</span>
  </div>
  <!-- 네이티브 디렉토리 선택 input (숨김) -->
  <input type="file" id="dir-file-input" webkitdirectory multiple style="display:none">
  <button id="btn-browse" class="btn btn-sm btn-outline-primary d-flex align-items-center gap-1">
    <i class="bi bi-folder-symlink"></i> 폴더 선택
  </button>
  <button id="btn-load" class="btn btn-sm btn-primary d-flex align-items-center gap-1" disabled>
    <i class="bi bi-arrow-clockwise"></i> 다시 불러오기
  </button>
  <div id="loading" class="spinner-border spinner-border-sm text-primary ms-2"></div>
  <span id="dir-status" class="text-muted small ms-1"></span>
</div>

<!-- ── Main ── -->
<div class="container-fluid px-3 py-3">

  <!-- Stats -->
  <div class="row g-3 mb-3">
    <div class="col-6 col-sm-4 col-md-2">
      <div class="stat-card gray">
        <div class="value" id="stat-devices">—</div>
        <div class="label"><i class="bi bi-hdd-network me-1"></i>총 장비 수</div>
      </div>
    </div>
    <div class="col-6 col-sm-4 col-md-2">
      <div class="stat-card blue">
        <div class="value" id="stat-total">—</div>
        <div class="label"><i class="bi bi-diagram-3 me-1"></i>총 IP 수</div>
      </div>
    </div>
    <div class="col-6 col-sm-4 col-md-2">
      <div class="stat-card green">
        <div class="value" id="stat-system">—</div>
        <div class="label"><i class="bi bi-circle-fill me-1" style="color:var(--color-system)"></i>System IP</div>
      </div>
    </div>
    <div class="col-6 col-sm-4 col-md-2">
      <div class="stat-card blue">
        <div class="value" id="stat-iface">—</div>
        <div class="label"><i class="bi bi-ethernet me-1"></i>Interface IP</div>
      </div>
    </div>
    <div class="col-6 col-sm-4 col-md-2">
      <div class="stat-card orange">
        <div class="value" id="stat-static">—</div>
        <div class="label"><i class="bi bi-signpost-2 me-1"></i>Static Route</div>
      </div>
    </div>
    <div class="col-6 col-sm-4 col-md-2">
      <div class="stat-card gray">
        <div class="value" id="stat-date" style="font-size:1rem;padding-top:6px">—</div>
        <div class="label"><i class="bi bi-calendar3 me-1"></i>최신 Config</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar d-flex flex-wrap align-items-center gap-2 mb-2">
    <ul class="nav tab-pill mb-0" id="type-tabs">
      <li class="nav-item"><a class="nav-link active" href="#" data-type="all">전체</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-type="System IP">System IP</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-type="Interface IP">Interface IP</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-type="Static Route">Static Route</a></li>
    </ul>

    <div class="input-group input-group-sm ms-auto" style="max-width:240px">
      <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
      <input id="search-input" type="text" class="form-control" placeholder="IP, 장비명, Peer 검색...">
    </div>

    <div class="d-flex gap-1">
      <button id="btn-excel" class="btn btn-sm btn-success d-flex align-items-center gap-1" disabled>
        <i class="bi bi-file-earmark-excel"></i> Excel
      </button>
      <button id="btn-csv" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1" disabled>
        <i class="bi bi-filetype-csv"></i> CSV
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="table table-bordered ip-table mb-0">
      <thead id="table-head"></thead>
      <tbody id="table-body">
        <tr>
          <td colspan="16" class="empty-state">
            <i class="bi bi-folder-symlink d-block mb-2"></i>
            <strong>폴더 선택</strong> 버튼을 클릭하여 Config 폴더를 선택하세요.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="text-muted small mt-1" id="row-count-label"></div>
</div>

<!-- ════════════════════════════════════════
     컬럼 설정 모달
════════════════════════════════════════ -->
<div class="modal fade" id="colModal" tabindex="-1" aria-labelledby="colModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:420px">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title d-flex align-items-center gap-2" id="colModalLabel">
          <i class="bi bi-layout-three-columns text-primary"></i>
          컬럼 설정
        </h6>
        <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body col-modal-body p-2">
        <p class="text-muted small mb-2 px-1">
          <i class="bi bi-grip-vertical me-1"></i>드래그로 순서 변경 &nbsp;|&nbsp;
          <i class="bi bi-check2-square me-1"></i>체크박스로 표시 여부 설정
        </p>
        <!-- 컬럼 아이템 목록 (JS로 렌더링) -->
        <div id="col-items-list"></div>
      </div>

      <div class="modal-footer py-2 d-flex justify-content-between">
        <div class="col-modal-actions">
          <button id="btn-col-all"   class="btn btn-sm btn-outline-primary">전체 표시</button>
          <button id="btn-col-reset" class="btn btn-sm btn-outline-secondary">기본값 복원</button>
        </div>
        <button type="button" class="btn btn-sm btn-primary" data-bs-dismiss="modal">
          <i class="bi bi-check2 me-1"></i>적용
        </button>
      </div>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ════════════════════════════════════════════════════
   컬럼 정의 (순서 변경/가시성 관리의 기준)
════════════════════════════════════════════════════ */
const COLUMNS_DEF = [
  { key: 'network_address', label: '네트워크',     sortable: true,  defaultVisible: false },
  { key: 'subnet_mask',     label: '서브넷',       sortable: false, defaultVisible: false },
  { key: 'cidr',            label: 'CIDR',        sortable: true,  defaultVisible: true  },
  { key: 'ip_type',         label: '유형',         sortable: true,  defaultVisible: true  },
  { key: 'device_name',     label: '장비명',       sortable: true,  defaultVisible: true  },
  { key: 'device_model',    label: '모델',         sortable: false, defaultVisible: true  },
  { key: 'location',        label: '위치',         sortable: false, defaultVisible: true  },
  { key: 'interface_name',  label: '인터페이스',   sortable: true,  defaultVisible: true  },
  { key: 'port',            label: '포트',         sortable: false, defaultVisible: true  },
  { key: 'desc',            label: '설명',         sortable: false, defaultVisible: true  },
  { key: 'peer_device',     label: 'Peer 장비',    sortable: true,  defaultVisible: true  },
  { key: 'peer_port',       label: 'Peer 포트',    sortable: false, defaultVisible: true  },
  { key: 'next_hop_ip',     label: 'Next-hop',     sortable: true,  defaultVisible: true  },
  { key: 'admin_state',     label: '상태',         sortable: true,  defaultVisible: true  },
  { key: 'config_date',     label: 'Config 날짜',  sortable: true,  defaultVisible: true  },
  { key: 'router_id',       label: 'Router ID',    sortable: false, defaultVisible: false },
  { key: 'as_number',       label: 'AS 번호',      sortable: false, defaultVisible: false },
  { key: 'os_version',      label: 'OS 버전',      sortable: false, defaultVisible: false },
  { key: 'filename',        label: '파일명',       sortable: false, defaultVisible: false },
];

const LS_KEY = 'ip-mgr-col-state-v2';

/* ════════════════════════════════════════════════════
   컬럼 상태 관리 (순서 배열 + 가시성 맵)
   colOrder: [key, key, ...]   — 표시 순서
   colVisible: {key: bool, ...} — 가시성
════════════════════════════════════════════════════ */
let colOrder   = COLUMNS_DEF.map(c => c.key);
let colVisible = Object.fromEntries(COLUMNS_DEF.map(c => [c.key, c.defaultVisible]));

function saveColState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ colOrder, colVisible }));
}
function loadColState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const { colOrder: o, colVisible: v } = JSON.parse(raw);
    // 새 컬럼이 추가됐을 경우를 대비해 병합
    const knownKeys = new Set(COLUMNS_DEF.map(c => c.key));
    colOrder = [
      ...o.filter(k => knownKeys.has(k)),                         // 저장된 순서
      ...COLUMNS_DEF.map(c => c.key).filter(k => !o.includes(k)) // 새 컬럼은 뒤에
    ];
    colVisible = { ...Object.fromEntries(COLUMNS_DEF.map(c => [c.key, c.defaultVisible])), ...v };
  } catch {}
}
function resetColState() {
  colOrder   = COLUMNS_DEF.map(c => c.key);
  colVisible = Object.fromEntries(COLUMNS_DEF.map(c => [c.key, c.defaultVisible]));
  saveColState();
}

/* ════════════════════════════════════════════════════
   State
════════════════════════════════════════════════════ */
let allRecords      = [];
let filteredRecords = [];
let currentType     = 'all';
let searchQuery     = '';
let sortCol         = 'device_name';
let sortDir         = 'asc';
let currentDir      = '__upload__';
let selectedFiles   = [];   // 선택된 로컬 .txt 파일 목록

/* ════════════════════════════════════════════════════
   파일 업로드 및 파싱
════════════════════════════════════════════════════ */
async function uploadAndLoad(files) {
  document.getElementById('loading').style.display = 'inline-block';
  document.getElementById('btn-load').disabled = true;
  document.getElementById('dir-status').textContent = '';
  try {
    const formData = new FormData();
    files.forEach(f => formData.append('files', f, f.name));

    const res  = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) {
      setDirStatus('⚠ ' + (data.error || '오류 발생'), '#dc3545');
      return;
    }
    allRecords = data.records || [];
    currentDir = '__upload__';
    updateStats(data.summary);
    setDirStatus(
      `✓ ${allRecords.length}개 레코드 로드 완료 (${uniqueCount(allRecords,'device_name')}개 장비, ${data.file_count}개 파일)`,
      '#198754'
    );
    document.getElementById('btn-excel').disabled = false;
    document.getElementById('btn-csv').disabled   = false;
    applyFilter();
  } catch (e) {
    setDirStatus('⚠ 오류: ' + e.message, '#dc3545');
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-load').disabled = selectedFiles.length === 0;
  }
}
function setDirStatus(msg, color) {
  const el = document.getElementById('dir-status');
  el.textContent = msg;
  el.style.color = color;
}

/* ════════════════════════════════════════════════════
   Stats
════════════════════════════════════════════════════ */
function updateStats(s) {
  document.getElementById('stat-devices').textContent = s.total_devices ?? 0;
  document.getElementById('stat-total').textContent   = s.total_ips    ?? 0;
  document.getElementById('stat-system').textContent  = (s.by_type||{})['System IP']    ?? 0;
  document.getElementById('stat-iface').textContent   = (s.by_type||{})['Interface IP'] ?? 0;
  document.getElementById('stat-static').textContent  = (s.by_type||{})['Static Route'] ?? 0;
  document.getElementById('stat-date').textContent    = s.latest_date || '—';
  document.getElementById('record-count').textContent = (s.total_ips ?? 0) + ' records';
}

/* ════════════════════════════════════════════════════
   Filter + Sort
════════════════════════════════════════════════════ */
function applyFilter() {
  const q = searchQuery.toLowerCase();
  filteredRecords = allRecords.filter(r => {
    if (currentType !== 'all' && r.ip_type !== currentType) return false;
    if (q) {
      const hay = [
        r.cidr, r.ip_address, r.device_name, r.device_model, r.location,
        r.interface_name, r.port, r.interface_desc, r.port_desc,
        r.peer_device, r.peer_port, r.next_hop_ip, r.route_desc, r.admin_state
      ].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  filteredRecords.sort((a, b) => {
    const av = getCellValue(a, sortCol).toLowerCase();
    const bv = getCellValue(b, sortCol).toLowerCase();
    return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  renderTable();
}

/* ════════════════════════════════════════════════════
   셀 값 추출 (key별 특수 처리)
════════════════════════════════════════════════════ */
function getCellValue(r, key) {
  if (key === 'desc') return r.interface_desc || r.port_desc || r.route_desc || '';
  return (r[key] ?? '').toString();
}

function getCellHtml(r, key) {
  switch (key) {
    case 'cidr':
      return `<td class="mono fw-semibold">${esc(r.cidr)}</td>`;
    case 'ip_type':
      return `<td>${typeBadge(r.ip_type)}</td>`;
    case 'device_name':
      return `<td class="mono">${esc(r.device_name)}</td>`;
    case 'device_model':
      return `<td><small>${esc(r.device_model)}</small></td>`;
    case 'location':
      return `<td><small>${esc(r.location)}</small></td>`;
    case 'interface_name':
      return `<td class="mono">${esc(r.interface_name)}</td>`;
    case 'port':
      return `<td class="mono"><small>${esc(r.port)}</small></td>`;
    case 'desc': {
      const d = esc(r.interface_desc || r.port_desc || r.route_desc);
      return `<td class="peer-cell" title="${d}"><small>${d}</small></td>`;
    }
    case 'peer_device': {
      const p = esc(r.peer_device);
      return `<td class="peer-cell mono" title="${p}">${p}</td>`;
    }
    case 'peer_port':
      return `<td class="mono"><small>${esc(r.peer_port)}</small></td>`;
    case 'next_hop_ip':
      return r.next_hop_ip
        ? `<td class="mono"><span class="text-warning fw-semibold">${esc(r.next_hop_ip)}</span></td>`
        : `<td></td>`;
    case 'subnet_mask':
      return `<td class="mono"><small>${esc(r.subnet_mask)}</small></td>`;
    case 'network_address':
      return `<td class="mono"><small>${esc(r.network_address)}</small></td>`;
    case 'admin_state':
      return `<td>${stateBadge(r.admin_state)}</td>`;
    case 'config_date':
      return `<td><small>${esc(r.config_date)}</small></td>`;
    case 'router_id':
      return `<td class="mono"><small>${esc(r.router_id)}</small></td>`;
    case 'as_number':
      return `<td class="mono"><small>${esc(r.as_number)}</small></td>`;
    case 'os_version':
      return `<td><small>${esc(r.os_version)}</small></td>`;
    case 'filename':
      return `<td><small style="word-break:break-all">${esc(r.filename)}</small></td>`;
    default:
      return `<td>${esc(r[key] ?? '')}</td>`;
  }
}

/* ════════════════════════════════════════════════════
   헤더 동적 렌더링
════════════════════════════════════════════════════ */
function renderHeader() {
  const visibleCols = colOrder.filter(k => colVisible[k]);
  const colCount    = visibleCols.length + 1; // +1: 설정 버튼 컬럼

  let html = '<tr>';
  // 고정 설정 버튼 컬럼
  html += `<th class="th-settings" title="컬럼 설정">
    <button class="btn-col-settings" id="btn-open-col-modal" title="컬럼 표시/순서 설정">
      <i class="bi bi-gear-fill"></i>
    </button>
  </th>`;

  visibleCols.forEach(key => {
    const def = COLUMNS_DEF.find(c => c.key === key);
    if (!def) return;
    const sortClass = def.sortable ? 'sortable' : '';
    const sortActive = sortCol === key ? sortDir : '';
    html += `<th class="${sortClass} ${sortActive}" data-col="${key}">
      ${def.label}${def.sortable ? '<span class="sort-icon"></span>' : ''}
    </th>`;
  });

  html += '</tr>';
  document.getElementById('table-head').innerHTML = html;

  // 정렬 이벤트 재바인딩
  document.querySelectorAll('#table-head th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      sortDir = sortCol === col ? (sortDir === 'asc' ? 'desc' : 'asc') : 'asc';
      sortCol = col;
      renderHeader();
      applyFilter();
    });
  });

  // 설정 버튼 바인딩
  document.getElementById('btn-open-col-modal')?.addEventListener('click', openColModal);

  return colCount;
}

/* ════════════════════════════════════════════════════
   테이블 바디 동적 렌더링
════════════════════════════════════════════════════ */
function renderTable() {
  const colCount    = renderHeader();
  const visibleCols = colOrder.filter(k => colVisible[k]);
  const tbody       = document.getElementById('table-body');
  const label       = document.getElementById('row-count-label');

  if (filteredRecords.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${colCount}" class="empty-state">
      <i class="bi bi-search d-block mb-2"></i>검색 결과가 없습니다.</td></tr>`;
    label.textContent = '';
    return;
  }

  label.textContent = `${filteredRecords.length.toLocaleString()} / ${allRecords.length.toLocaleString()} 건`;

  tbody.innerHTML = filteredRecords.map(r =>
    `<tr><td style="width:30px;min-width:30px;background:#f8f9fa"></td>${
      visibleCols.map(k => getCellHtml(r, k)).join('')
    }</tr>`
  ).join('');
}

/* ════════════════════════════════════════════════════
   컬럼 설정 모달
════════════════════════════════════════════════════ */
let colModal = null;

function openColModal() {
  renderColItems();
  if (!colModal) colModal = new bootstrap.Modal(document.getElementById('colModal'));
  colModal.show();
}

function renderColItems() {
  const list = document.getElementById('col-items-list');
  list.innerHTML = colOrder.map((key, idx) => {
    const def     = COLUMNS_DEF.find(c => c.key === key);
    if (!def) return '';
    const checked = colVisible[key] ? 'checked' : '';
    return `
    <div class="col-item" data-key="${key}" data-idx="${idx}">
      <span class="drag-handle" title="드래그하여 순서 변경">
        <i class="bi bi-grip-vertical"></i>
      </span>
      <input class="form-check-input flex-shrink-0" type="checkbox" id="col-chk-${key}"
             data-key="${key}" ${checked} style="margin:0">
      <label class="col-label" for="col-chk-${key}">${def.label}</label>
      <span class="col-key">${key}</span>
    </div>`;
  }).join('');

  // 체크박스 이벤트
  list.querySelectorAll('input[type=checkbox]').forEach(chk => {
    chk.addEventListener('change', () => {
      colVisible[chk.dataset.key] = chk.checked;
      saveColState();
      renderTable();
    });
  });
  // SortableJS는 shown.bs.modal 이후에 initSortable() 호출
}

/* ════════════════════════════════════════════════════
   드래그앤드롭 — SortableJS 기반
════════════════════════════════════════════════════ */
let _sortableInstance = null;

function initSortable(container) {
  if (!container) return;

  // 이전 인스턴스 정리
  if (_sortableInstance) {
    _sortableInstance.destroy();
    _sortableInstance = null;
  }

  _sortableInstance = Sortable.create(container, {
    handle:        '.drag-handle',
    animation:     180,
    ghostClass:    'sortable-ghost',
    chosenClass:   'sortable-chosen',
    dragClass:     'sortable-drag',
    forceFallback: true,   // HTML5 DnD 대신 CSS3+마우스 이벤트 사용 (overflow 컨테이너 문제 해결)
    fallbackTolerance: 3,  // 3px 이상 이동 시 드래그 시작

    onEnd(evt) {
      const items = container.querySelectorAll('.col-item');
      colOrder = Array.from(items).map(el => el.dataset.key);
      saveColState();
      renderTable();
    }
  });
}

/* ════════════════════════════════════════════════════
   모달 액션 버튼
════════════════════════════════════════════════════ */
document.getElementById('btn-col-all').addEventListener('click', () => {
  Object.keys(colVisible).forEach(k => colVisible[k] = true);
  saveColState();
  renderColItems();
  renderTable();
});
document.getElementById('btn-col-reset').addEventListener('click', () => {
  resetColState();
  renderColItems();
  renderTable();
});

/* ════════════════════════════════════════════════════
   탭 필터
════════════════════════════════════════════════════ */
document.querySelectorAll('#type-tabs .nav-link').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('#type-tabs .nav-link').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    currentType = a.dataset.type;
    applyFilter();
  });
});

/* ════════════════════════════════════════════════════
   검색
════════════════════════════════════════════════════ */
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilter();
});

/* ════════════════════════════════════════════════════
   폴더 선택 (네이티브 OS 파일 브라우저)
════════════════════════════════════════════════════ */
document.getElementById('btn-browse').addEventListener('click', () => {
  document.getElementById('dir-file-input').click();
});

document.getElementById('dir-file-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith('.txt'));
  selectedFiles = files;

  const dispEl = document.getElementById('dir-display');
  if (files.length === 0) {
    dispEl.innerHTML = '<span class="text-danger">선택한 폴더에 .txt 파일이 없습니다</span>';
    document.getElementById('btn-load').disabled = true;
    return;
  }

  const dirName = files[0].webkitRelativePath.split('/')[0];
  dispEl.innerHTML = `<i class="bi bi-folder-fill text-warning me-1"></i><strong>${esc(dirName)}</strong>&nbsp;<span class="text-muted">(${files.length}개 파일)</span>`;
  document.getElementById('btn-load').disabled = false;

  // 선택 즉시 자동 업로드 및 파싱
  await uploadAndLoad(files);
});

/* ════════════════════════════════════════════════════
   다시 불러오기 버튼
════════════════════════════════════════════════════ */
document.getElementById('btn-load').addEventListener('click', async () => {
  if (selectedFiles.length > 0) await uploadAndLoad(selectedFiles);
});

/* ════════════════════════════════════════════════════
   내보내기 (현재 컬럼 순서/표시 설정 반영)
════════════════════════════════════════════════════ */
function buildExportUrl(base) {
  const visibleCols = colOrder.filter(k => colVisible[k]);
  const params = new URLSearchParams({
    dir:  currentDir,
    cols: visibleCols.join(','),
  });
  return `${base}?${params}`;
}
document.getElementById('btn-excel').addEventListener('click', () => {
  window.location = buildExportUrl('/api/export/excel');
});
document.getElementById('btn-csv').addEventListener('click', () => {
  window.location = buildExportUrl('/api/export/csv');
});

/* ════════════════════════════════════════════════════
   Badge / esc 헬퍼
════════════════════════════════════════════════════ */
function typeBadge(t) {
  if (t === 'System IP')    return `<span class="badge badge-system">${t}</span>`;
  if (t === 'Interface IP') return `<span class="badge badge-iface">${t}</span>`;
  if (t === 'Static Route') return `<span class="badge badge-static">${t}</span>`;
  return `<span class="badge bg-secondary">${t}</span>`;
}
function stateBadge(s) {
  return s === 'Active'
    ? `<span class="badge badge-active">Active</span>`
    : `<span class="badge badge-shutdown">Shutdown</span>`;
}
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
}
function uniqueCount(arr, key) {
  return new Set(arr.map(x => x[key])).size;
}

/* ════════════════════════════════════════════════════
   초기화
════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  loadColState();
  renderHeader();   // 빈 상태에서도 헤더 먼저 렌더

  // 모달이 완전히 나타난 후 SortableJS 초기화
  // (display:none 상태에서는 SortableJS가 정상 동작하지 않음)
  document.getElementById('colModal').addEventListener('shown.bs.modal', () => {
    initSortable(document.getElementById('col-items-list'));
  });
});
</script>
